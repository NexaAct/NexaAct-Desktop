    <text class="title" x="92" y="28">Remote workspace</text>
    <text class="body muted" x="92" y="68">NexaAct - gpt-5.5 - OpenAI</text>
    <rect class="soft" x="448" y="4" width="188" height="62" rx="30"/>
    <text class="title" x="494" y="46">Authorized</text>
  </g>
  <line x1="0" y1="318" x2="720" y2="318" class="line"/>
