  <text class="big" x="456" y="146">R</text>
  <text class="big" x="548" y="146">Open</text>
  <circle cx="660" cy="132" r="38" fill="#f0f2f5" stroke="#d4d8de" stroke-width="2"/>
  <path d="M638 135c7-18 33-18 40 0 14 1 20 20 7 28h-48c-14-8-8-27 1-28Z" stroke="#53606d" stroke-width="5" fill="none"/>
  <g transform="translate(36 220)">
