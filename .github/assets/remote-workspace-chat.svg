  <text class="body" x="56" y="1214">Enter a task, question, or code change</text>
  <rect class="soft" x="46" y="1244" width="160" height="52" rx="18"/>
  <text class="body muted" x="70" y="1280">gpt-5...</text>
  <rect x="600" y="1234" width="76" height="76" rx="22" fill="#111827"/>
