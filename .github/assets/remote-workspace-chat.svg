    .line { stroke: #dde1e6; }
    .card { fill: #ffffff; stroke: #dde1e6; }
    .soft { fill: #f2f4f7; }
    .small { font-size: 22px; }
    .body { font-size: 30px; }
    .title { font-size: 36px; font-weight: 750; }
    .big { font-size: 46px; font-weight: 760; }
    .hero { font-size: 44px; font-weight: 760; }
  </style>
  <rect width="720" height="1280" fill="#ffffff"/>
  <rect x="0" y="0" width="720" height="76" fill="#eef2f3"/>
  <text class="big" x="42" y="50">16:48</text>
  <text class="body" font-weight="700" x="462" y="50">5G</text>
  <text class="body" font-weight="700" x="535" y="50">5G</text>
  <rect x="626" y="22" width="58" height="30" rx="7" fill="#111318"/>
  <text class="small" fill="#fff" font-weight="700" x="642" y="45">83</text>
  <line x1="0" y1="76" x2="720" y2="76" class="line"/>
